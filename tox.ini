[tox]
envlist = test, lint

[testenv:test]
basepython = python3.11
runner = uv-venv-lock-runner
dependency_groups = test
setenv =
  COVERAGE_FILE = {env_tmp_dir}/.coverage
commands =
  pytest \
    -vv \
    --cov \
    --cov-report=term-missing \
    --cov-report=xml:{env_tmp_dir}/coverage.xml \
    --cov-report=html:{env_tmp_dir}/htmlcov

[testenv:lint]
basepython = python3.11
runner = uv-venv-lock-runner
dependency_groups = lint
ignore_errors = true
commands =
  ruff check --no-fix .
  ruff format --check .
  ty check
